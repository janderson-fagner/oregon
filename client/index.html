<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <script>window.__APP_BRAND__ = '__APP_BRAND__';</script>
  <link rel="icon" id="dynamic-favicon" href="__APP_FAVICON__" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__APP_TITLE__</title>
  <link rel="stylesheet" type="text/css" href="public/loader.css" />
</head>

<body>
  <div id="app">
    <div id="loading-bg">

      <!-- Ambient particles -->
      <div class="loader-particle"></div>
      <div class="loader-particle"></div>
      <div class="loader-particle"></div>
      <div class="loader-particle"></div>
      <div class="loader-particle"></div>
      <div class="loader-particle"></div>

      <!-- Morphing gradient orbs -->
      <div class="loader-orb"></div>
      <div class="loader-orb-2"></div>

      <!-- Corner accents -->
      <div class="loader-accent loader-accent-tl"></div>
      <div class="loader-accent loader-accent-br"></div>

      <!-- Logo + Progress -->
      <div class="loader-logo-wrap">
        <img id="dynamic-logo" src="__APP_LOGO__" alt="Logo" />
      </div>

      <div class="loader-progress-track">
        <div class="loader-progress-fill"></div>
      </div>

      <div class="loader-status">
        Carregando<span class="loader-status-dots" id="loader-dots"></span>
      </div>

    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
  <script>
    const loaderColor = localStorage.getItem('vuexy-initial-loader-bg') || '#FFFFFF';
    const primaryColor = localStorage.getItem('vuexy-initial-loader-color') || '#7367F0';

    if (loaderColor)
      document.documentElement.style.setProperty('--initial-loader-bg', loaderColor);

    if (primaryColor)
      document.documentElement.style.setProperty('--initial-loader-color', primaryColor);

    // Detect dark background for orb intensity
    (function() {
      var bg = loaderColor || '#FFFFFF';
      var r = parseInt(bg.slice(1,3), 16) || 255;
      var g = parseInt(bg.slice(3,5), 16) || 255;
      var b = parseInt(bg.slice(5,7), 16) || 255;
      if ((r * 0.299 + g * 0.587 + b * 0.114) < 140) {
        document.getElementById('loading-bg').classList.add('dark-loader');
      }
    })();

    // Animated dots
    (function() {
      var dots = document.getElementById('loader-dots');
      var count = 0;
      setInterval(function() {
        count = (count + 1) % 4;
        dots.textContent = '.'.repeat(count);
      }, 500);
    })();
  </script>
</body>
</html>
